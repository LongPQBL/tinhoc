<!DOCTYPE html>
<html lang="vi" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>THE HUB. - Trang tin tức & Blog hàng đầu Việt Nam</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            heading: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); }</style>
</head>
<body>
  <!-- Header (rendered once, never re-renders) -->
  <div id="headerRoot"></div>

  <!-- Search Overlay (rendered once) -->
  <div id="searchOverlayRoot"></div>

  <!-- SPA Page Container -->
  <main id="pageContainer" class="page-wrapper"></main>

  <!-- Footer (rendered once, never re-renders) -->
  <div id="footerRoot"></div>

  <script src="js/articles-data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/router.js"></script>
  <script>
    // Insert header, footer, search overlay once
    document.getElementById('headerRoot').innerHTML = getHeaderHTML('home');
    document.getElementById('footerRoot').innerHTML = getFooterHTML();
    document.getElementById('searchOverlayRoot').innerHTML = getSearchOverlayHTML();
  </script>
</body>
</html>
